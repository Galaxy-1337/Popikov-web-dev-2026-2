{% extends 'base.html' %}

{% block content %}

<div class="page-wrap">

  <div class="page-header">
    <a href="{{ url_for('index') }}" class="page-back">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      Назад
    </a>
    <div class="page-title-block">
      <div class="page-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 17 10 11 4 5"/>
          <line x1="12" x2="20" y1="19" y2="19"/>
        </svg>
      </div>
      <h1 class="page-title">Заголовки запроса</h1>
    </div>
    <p class="page-desc">Все HTTP-заголовки текущего запроса, отправленные браузером.</p>
  </div>

  <div class="data-table-wrap">
    <table class="data-table" id="headers-table">
      <thead>
        <tr>
          <th>Заголовок</th>
          <th>Значение</th>
        </tr>
      </thead>
      <tbody>
        {% for key, value in headers.items() %}
        <tr>
          <td><span class="key-badge">{{ key }}</span></td>
          <td class="val-cell val-cell--mono">{{ value }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

</div>

{% endblock %}

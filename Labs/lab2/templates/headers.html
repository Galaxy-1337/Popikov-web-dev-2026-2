{% extends 'base.html' %}

{% block content %}
<div class="container">
  <div class="section-header">
    <span class="section-title">Заголовки запроса</span>
    <span class="section-line"></span>
    <span class="section-count">HTTP-headers</span>
  </div>

  <div class="posts-grid" style="grid-template-columns: 1fr;">
    <article class="post-card">
      <div class="post-card-body">
        <div class="post-card-meta">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
            Все заголовки запроса
        </div>
        <div style="overflow-x: auto; max-height: 500px; overflow-y: auto;">
          <table style="width: 100%; border-collapse: collapse;">
            <thead>
              <tr style="border-bottom: 1px solid var(--border-light); position: sticky; top: 0; background: var(--bg-card);">
                <th style="text-align: left; padding: 0.5rem; color: var(--brand-primary);">Заголовок</th>
                <th style="text-align: left; padding: 0.5rem; color: var(--brand-primary);">Значение</th>
              </tr>
            </thead>
            <tbody>
              {% for key, value in headers.items() %}
              <tr style="border-bottom: 1px solid var(--border-light);">
                <td style="padding: 0.5rem; vertical-align: top;"><code style="background: var(--bg-page); padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.75rem;">{{ key }}</code></td>
                <td style="padding: 0.5rem; vertical-align: top; word-break: break-all;"><code style="background: var(--bg-page); padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.75rem;">{{ value }}</code></td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </article>
  </div>
</div>
{% endblock %}

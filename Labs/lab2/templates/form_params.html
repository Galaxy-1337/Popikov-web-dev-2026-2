{% extends 'base.html' %}

{% block content %}
<div class="container">
  <div class="section-header">
    <span class="section-title">Параметры формы</span>
    <span class="section-line"></span>
    <span class="section-count">POST-данные</span>
  </div>

  <div class="posts-grid" style="grid-template-columns: 1fr;">
    <article class="post-card">
      <div class="post-card-body">
        <form method="POST">
          <div class="form-group">
            <label for="name" class="form-label">Имя:</label>
            <input type="text" name="name" id="name" class="form-input" placeholder="Введите имя">
          </div>
          <div class="form-group">
            <label for="email" class="form-label">Email:</label>
            <input type="email" name="email" id="email" class="form-input" placeholder="Введите email">
          </div>
          <div class="form-group">
            <label for="message" class="form-label">Сообщение:</label>
            <textarea name="message" id="message" class="form-input" rows="3" placeholder="Введите сообщение"></textarea>
          </div>
          <button type="submit" class="btn-submit">Отправить</button>
        </form>
      </div>
    </article>
  </div>

  {% if form_data %}
  <div class="section-header" style="margin-top: 2rem;">
    <span class="section-title">Отправленные данные</span>
    <span class="section-line"></span>
    <span class="section-count">результат POST</span>
  </div>

  <div class="posts-grid" style="grid-template-columns: 1fr;">
    <article class="post-card">
      <div class="post-card-body">
        <div class="post-card-meta">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v16h16"/><path d="m9 15 3-3 3 3"/><path d="M12 12V4"/></svg>
          Полученные значения
        </div>
        <div style="overflow-x: auto;">
          <table style="width: 100%; border-collapse: collapse;">
            <thead>
              <tr style="border-bottom: 1px solid var(--border-light);">
                <th style="text-align: left; padding: 0.5rem; color: var(--brand-primary);">Поле</th>
                <th style="text-align: left; padding: 0.5rem; color: var(--brand-primary);">Значение</th>
              </tr>
            </thead>
            <tbody>
              {% for key, value in form_data.items() %}
              <tr style="border-bottom: 1px solid var(--border-light);">
                <td style="padding: 0.5rem;"><code style="background: var(--bg-page); padding: 0.2rem 0.4rem; border-radius: 4px;">{{ key }}</code></td>
                <td style="padding: 0.5rem;"><code style="background: var(--bg-page); padding: 0.2rem 0.4rem; border-radius: 4px;">{{ value }}</code></td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </article>
  </div>
  {% endif %}
</div>
{% endblock %}

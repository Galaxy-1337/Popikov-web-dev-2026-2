<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Персональный блог — статьи, мысли и идеи">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <title>{% if title %}{{ title }} — DevBlog{% else %}DevBlog{% endif %}</title>
</head>

<body>

  <!-- Навигационная панель -->
  <nav class="site-navbar">
    <div class="navbar-inner">
      <a class="navbar-brand-link" href="{{ url_for('posts') }}">
        <span class="brand-dot"></span>
        PolyBlog
      </a>
      <ul class="navbar-links">
        <li>
          <a class="nav-link-item" href="/">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
            На портал
          </a>
        </li>
        <li>
          <a class="nav-link-item" href="{{ url_for('posts') }}">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Главная
          </a>
        </li>
        <li>
          <a class="nav-link-item" href="{{ url_for('about') }}">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
            Об авторе
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Контент -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="brand-dot"></span>
        PolyBlog
      </div>
      <div class="footer-info">
        <strong>ФИО:</strong> Попиков Иван Алексеевич &nbsp;·&nbsp; <strong>Группа:</strong> 241-372
      </div>
    </div>
  </footer>

</body>
</html>
